version: '3.8'

services:
  # 1. The Vector Database
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dietary_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dietary_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. The FastAPI Backend
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # This maps your local code to the container so you get live-reloading!
      - ./backend:/app 
    depends_on:
      db:
        condition: service_healthy # Waits for DB to be ready before starting API
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # This prevents Windows node_modules from breaking Linux
    depends_on:
      - api

volumes:
  pgdata: